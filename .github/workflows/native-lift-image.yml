name: native-lift image

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .dockerignore
      - .github/workflows/native-lift-image.yml
      - containers/native-lift/**
      - skills/native-lift/**

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'workflow_dispatch'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/native-lift/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ghcr.io/${{ github.repository_owner }}/rekit-native-lift:remill-6.0.1-llvm-21
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=native-lift
          cache-to: type=gha,mode=max,scope=native-lift

      - name: Record immutable manifest digest
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "ghcr.io/${{ github.repository_owner }}/rekit-native-lift@${{ steps.build.outputs.digest }}" \
            | tee native-lift-image.txt

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: native-lift-image
          path: native-lift-image.txt
