name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.14"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python syntax
        run: git ls-files -z '*.py' | xargs -0 python -m py_compile

      - name: Check shell syntax
        run: |
          bash -n bin/rekit
          git ls-files -z 'skills/*/scripts/*.sh' | xargs -0 -r -n1 bash -n

      - name: Check generated skill metadata
        run: bin/rekit sync-docs --check

      - name: Run contract tests
        run: python -m unittest discover -s tests -v

  dex-dumper:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/dex-dump/scripts/dex-dumper

    steps:
      - uses: actions/checkout@v6

      - name: Test clean-room Rust source
        env:
          RUSTFLAGS: -Dwarnings
        run: cargo test --locked

      - name: Check formatting and lints
        run: |
          cargo fmt --check
          cargo clippy --locked --all-targets -- -D warnings
